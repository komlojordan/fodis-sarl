# Configuration Nginx pour fodis-sarl.com
# Autorise les requêtes POST vers admin_data.php

server {
    listen 80;
    listen [::]:80;
    server_name fodis-sarl.com www.fodis-sarl.com;
    root /var/www/fodis-sarl.com/public_html;
    index index.php index.html index.htm;

    # Logs
    access_log /var/log/nginx/fodis-sarl.access.log;
    error_log /var/log/nginx/fodis-sarl.error.log;

    # Redirection HTTP vers HTTPS (optionnel)
    # Décommentez si vous avez un certificat SSL
    # return 301 https://$server_name$request_uri;

    # Rejecter les accès aux fichiers cachés sauf .well-known
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Permettre .well-known pour Let's Encrypt
    location ~ /\.well-known {
        allow all;
    }

    # Fichiers statiques (CSS, JS, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Route par défaut
    location / {
        try_files $uri $uri/ =404;
    }

    # ✅ Exécuter les fichiers PHP (IMPORTANT: autorise tous les verbes HTTP)
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # Timeout pour PHP si admin_data.php prend du temps
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
    }

    # Sécurité: refuser l'exécution de scripts dans /data
    location ~* ^/data/.*\.php$ {
        deny all;
    }
}
