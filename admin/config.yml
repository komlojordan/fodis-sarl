backend:
  name: github
  repo: YOUR_GITHUB_USER/YOUR_REPO
  branch: main
  auth_scope: repo
  local_backend: true

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "site_info"
    label: "Informations du site"
    files:
      - file: "data/site_info.json"
        label: "Informations du site"
        name: "site_info"
        fields:
          - {label: "Nom", name: "name", widget: "string"}
          - label: "Coordonnées"
            name: "coordonnees"
            widget: "object"
            fields:
              - {label: "Adresse", name: "address", widget: "string"}
              - {label: "Téléphone", name: "phone", widget: "string"}
              - {label: "Email", name: "email", widget: "string"}
          - label: "Réseaux sociaux"
            name: "reseaux_sociaux"
            widget: "object"
            fields:
              - {label: "Tagline", name: "tagline", widget: "string"}
              - {label: "WhatsApp", name: "whatsapp", widget: "string"}
              - {label: "Label WhatsApp", name: "whatsapp_label", widget: "string"}
              - {label: "Message WhatsApp", name: "whatsapp_message", widget: "text"}
              - {label: "Horaires", name: "hours", widget: "string"}

  - name: "catalogues"
    label: "Catalogues"
    files:
      - file: "data/data.json"
        label: "Marques et catégories"
        name: "catalogues"
        fields:
          - label: "Catégories"
            name: "categories"
            widget: "list"
            field:
              {label: "Catégorie", name: "category", widget: "string"}
          - label: "Marques"
            name: "brands"
            widget: "list"
            field:
              {label: "Marque", name: "brand", widget: "string"}

  - name: "products"
    label: "Produits"
    files:
      - file: "data/products.json"
        label: "Produits"
        name: "products"
        fields:
          - label: "Produits"
            name: "products"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Nom", name: "name", widget: "string"}
              - {label: "Marque", name: "brand", widget: "string"}
              - label: "Catégories"
                name: "category"
                widget: "list"
                field:
                  {label: "Catégorie", name: "category", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Prix", name: "price", widget: "number"}
              - {label: "Prix promo", name: "currentPrice", widget: "number", required: false}
              - {label: "Devise", name: "currency", widget: "string"}
              - {label: "Unité", name: "unit", widget: "string"}
              - {label: "Poids", name: "weight", widget: "string"}
              - {label: "Dimensions", name: "dimensions", widget: "string"}
              - {label: "Couleur", name: "color", widget: "string"}
              - {label: "Disponibilité", name: "availability", widget: "string"}
              - label: "Images"
                name: "images"
                widget: "list"
                field:
                  {label: "Image", name: "image", widget: "image"}
              - {label: "Icône", name: "icon", widget: "string", required: false}
