backend:
  name: git-gateway
  branch: main

# Configuration des dossiers médias (images) basée sur votre arborescence
media_folder: "assets"
public_folder: "assets"

collections:
  # 1. COLLECTION : PRODUITS (Cible le fichier unique dans data/products.json)
  - name: "products_collection"
    label: "Produits"
    delete: false
    editor:
      preview: false
    files:
      - name: "products_list"
        label: "Tous les Produits"
        file: "data/products.json" # <--- Chemin corrigé
        fields:
          - label: "Vos Produits"
            name: "products"
            widget: "list"
            summary: "{{fields.name}} - {{fields.price}} {{fields.currency}}"
            fields:
              - { label: "Identifiant Unique (ex: qnc-ciment-colle)", name: "id", widget: "string" }
              - { label: "Nom du produit", name: "name", widget: "string" }
              
              # Liaison avec les marques
              - label: "Marque"
                name: "brand"
                widget: "relation"
                collection: "marques_collection"
                file: "data"
                search_fields: ["brands.*"]
                value_field: "brands.*"
                display_fields: ["brands.*"]
              
              # Liaison avec les catégories
              - label: "Catégorie(s)"
                name: "category"
                widget: "relation"
                collection: "categories_collection"
                file: "data"
                multiple: true
                search_fields: ["categories.*"]
                value_field: "categories.*"
                display_fields: ["categories.*"]

              - { label: "Description", name: "description", widget: "text" }
              - { label: "Prix standard", name: "price", widget: "number", value_type: "int" }
              - { label: "Prix promotionnel (Optionnel)", name: "currentPrice", widget: "number", value_type: "int", required: false }
              - { label: "Devise", name: "currency", widget: "string", default: "FCFA" }
              - { label: "Unité de vente", name: "unit", widget: "string" }
              - { label: "Poids / Volume", name: "weight", widget: "string" }
              - { label: "Dimensions", name: "dimensions", widget: "string" }
              - { label: "Couleur", name: "color", widget: "string" }
              
              - label: "Disponibilité"
                name: "availability"
                widget: "select"
                options: ["Disponible", "Sur commande", "Rupture de stock"]
              
              - label: "Images du produit"
                name: "images"
                widget: "list"
                field: { label: "Image", name: "image", widget: "image" }
                
              - { label: "Chemin de l'icône SVG", name: "icon", widget: "string" }

  # 2. COLLECTION : INFOS DU SITE (Cible data/site_info.json)
  - name: "site_info_collection"
    label: "Infos du Site"
    delete: false
    editor:
      preview: false
    files:
      - name: "site_info"
        label: "Configuration Générale"
        file: "data/site_info.json" # <--- Chemin corrigé
        fields:
          - { label: "Nom de l'entreprise", name: "name", widget: "string" }
          - label: "Coordonnées"
            name: "coordonnees"
            widget: "object"
            fields:
              - { label: "Adresse", name: "address", widget: "string" }
              - { label: "Téléphone", name: "phone", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
          - label: "Réseaux Sociaux & Contact"
            name: "reseaux_sociaux"
            widget: "object"
            fields:
              - { label: "Slogan / Tagline", name: "tagline", widget: "string" }
              - { label: "Numéro WhatsApp", name: "whatsapp", widget: "string" }
              - { label: "Texte du bouton WhatsApp", name: "whatsapp_label", widget: "string" }
              - { label: "Message WhatsApp pré-rempli", name: "whatsapp_message", widget: "text" }
              - { label: "Heures d'ouverture", name: "hours", widget: "string" }

  # 3. COLLECTION : MARQUES (Cible data/data.json)
  - name: "marques_collection"
    label: "Marques"
    delete: false
    editor:
      preview: false
    files:
      - name: "data"
        label: "Liste des Marques"
        file: "data/data.json" # <--- Chemin corrigé
        fields:
          - label: "Marques disponibles"
            name: "brands"
            widget: "list"
            field: { label: "Nom de la marque", name: "brand", widget: "string" }

  # 4. COLLECTION : CATÉGORIES (Cible data/data.json)
  - name: "categories_collection"
    label: "Catégories"
    delete: false
    editor:
      preview: false
    files:
      - name: "data"
        label: "Liste des Catégories"
        file: "data/data.json" # <--- Chemin corrigé
        fields:
          - label: "Catégories disponibles"
            name: "categories"
            widget: "list"
            field: { label: "Nom de la catégorie", name: "category", widget: "string" }